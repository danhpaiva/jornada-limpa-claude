<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jornada Limpa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div class="bg-glow"></div>

  <main class="card">

    <header class="card__header">
      <span class="badge">✦ Jornada Limpa</span>
      <p class="card__date" id="data-inicio-label">Desde 23 de julho de 2026</p>
    </header>

    <section class="counter-ring" aria-label="Contador de dias">
      <svg class="ring" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="ring__track" cx="100" cy="100" r="88" />
        <circle class="ring__progress" id="ring-progress" cx="100" cy="100" r="88" stroke-dasharray="553"
          stroke-dashoffset="553" stroke-linecap="round" transform="rotate(-90 100 100)" />
      </svg>
      <div class="counter-ring__inner">
        <span class="counter__number" id="dias-limpos">0</span>
        <span class="counter__label">dias de liberdade</span>
      </div>
    </section>

    <section class="message-box" aria-live="polite">
      <p class="message-box__text" id="mensagem"></p>
    </section>

    <section class="milestones" aria-label="Marcos da jornada">
      <h2 class="milestones__title">Próximos marcos</h2>
      <ul class="milestones__list" id="milestones-list"></ul>
    </section>

    <footer class="card__footer">
      <p class="card__slogan">Um dia de cada vez. Você é mais forte do que pensa.</p>
    </footer>

  </main>

  <script src="assets/js/script.js"></script>
</body>

</html>
